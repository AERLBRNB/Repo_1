<!DOCTYPE html>
<html>
<head>
    <title>ID Layout</title>
    <style>
        @font-face {
            font-family: 'Mantinia';
            src: url('Mantinia-Regular.ttf') format('ttf');
        }
        body {
            background-image: url("221664.gif");
            background-size: cover;
            background-repeat: no-repeat;
        }

        .container {
            width: 700px;
            height: 750px;
            color:#b19600;
            font-size: x-large;
            letter-spacing: 4px;
            font-family: 'Mantinia', serif;
            border: 2px solid #b19600;
            padding: 20px;
            margin: 0 auto;
            text-align: justify;
            background-color: black;
        }

        .photo {
            width: 200px;
            height: 200px;
            margin-bottom: 50px;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            width: 500px;
            text-align: center;
            margin: 0 auto;
        }

        .info p {
            border-bottom: .5px solid #b19600;
            padding: 5px 0;
            margin: 20px 0;
        }
    </style>
</head>
<body>



<div class="container">

    <div class="photo">
        <img src="bloggif_6996776544f58.gif" alt="My phuto">
    </div>

    <div class="info">
        <p><strong>Name:</strong> Bernabe, Earl Jam B.</p>
        <p><strong>Name:</strong> 251101135 </p>
        <p><strong>Course:</strong> Bachelor of Science in Computer Science</p>
        <p><strong>Section:</strong> BSCS-1B</p>
        <p><strong>Birth Day:</strong> May 19, 2007</p>
        <p><strong>Age:</strong> 18</p>
        <p><strong>From:</strong> Tartaria, Silang, Cavite </p>
        <p><strong>Hobbies:</strong> Playing video games, drawing, and fixing/building computers and laptops </p>
    </div>

</div>

</body>
</html>
